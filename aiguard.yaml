project: llm_test

model:
    provider: openai
    endpoint: https://api.openai.com/v1
    model_name: gpt-5.2
    api_key_env: OPENAI_API_KEY
    system_prompt_path: prompt_template.py
    tools_path: tools.py

evaluation:
    enabled_modules:
        - adversarial
        - hallucination
    adversarial:
        threshold: 0.15
        mode: quick
        runs_per_test: 3
        # dataset_config: datasets.json  # omit to use the bundled default adversarial dataset
        use_live_model: true
    hallucination:
        threshold: 0.25
        test_cases: hallucination_test_cases.json
        use_live_model: true

monitoring:
    enabled: true
    sampling_rate: 1.0
    queue_maxsize: 10000
    api:
        host: "0.0.0.0"
        port: 8080
    ui_port: 3000

review:
    port: 8000
    base_url: "http://localhost:8000"  # Used for email review links

smtp:
    host: "smtp.gmail.com"
    port: 587
    user: "simbanegayim@gmail.com"              # SMTP username
    #password: ""          # Or use env var: AIGUARD_SMTP_PASSWORD
    from: "simbanegayim@gmail.com"
    to:
        - "sheltonmutambirwa@gmail.com"
        - "mtazshelton@gmail.com"
    use_tls: true

judge:
    enabled: false
    provider: ollama
    endpoint: http://34.130.162.110:11434/v1
    model: judge-qwen
    timeout_s: 30
    max_tokens: 256
    temperature: 0.0
    

pipeline:
    evaluation_batch_interval_hours: 3
    max_batch_size: 3
    enable_hallucination_eval: true
    enable_adversarial_eval: true
    project_id: ""
    # Human Review Queue (auto-trigger)
    review:
        enabled: true          # Set to true to enable auto-trigger
        sample_rate: 0.50         # 20% random sampling (0.0-1.0)
        high_score_threshold: 0.6  # Review scores >= this (null = disabled)
        low_score_threshold: 0.0   # Review scores <= this (null = disabled)
        send_email: true          # Send email notifications to reviewers


storage: sqlite
