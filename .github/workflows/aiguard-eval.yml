name: AIGuard Evaluation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  aiguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install AIGuard
        run: pip install aiguard-safety
      - name: Install app dependencies
        run: pip install -r requirements.txt
      - name: Verify API key is set
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ OPENAI_API_KEY is not set"
            exit 1
          fi
          echo "✅ API key is present (length: ${#OPENAI_API_KEY})"
      - name: Run evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: aiguard evaluate --project llm_test
        continue-on-error: true
      - name: Upload AIGuard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aiguard-report
          path: .aiguard/reports/
          if-no-files-found: warn
          retention-days: 30
